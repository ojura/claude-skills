name: Package skills

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .skill bundles
        id: build
        run: |
          mkdir -p dist
          # A skill is any directory containing a SKILL.md.
          for skill_md in */SKILL.md; do
            dir="$(dirname "$skill_md")"
            name="$(basename "$dir")"
            # Zip files only (SKILL.md at archive root), no directory entries, skip .gitignore.
            ( cd "$dir" && find . -type f ! -name '.gitignore' | sed 's|^\./||' | sort | zip -X "../dist/${name}.skill" -@ )
            echo "Built dist/${name}.skill"
          done
          ls -l dist

      - name: Compute release tag
        id: tag
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Automated build from ${{ github.sha }}.
            Each `.skill` is a zip of its skill directory. Unzip into your Claude Code skills location.
          files: dist/*.skill
