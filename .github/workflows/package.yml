name: Package skills

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test-polisher:
    # Reports pass/fail only. Does NOT gate the package job below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install playwright pillow pypdfium2 pymupdf

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run quick smoke test
        run: bash claude-html-pdf-polisher/scripts/test_skill_quick.sh

  test-report:
    # Builds the markdown-latex-report fixture PDF. Reports pass/fail only;
    # does NOT gate the package job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-luatex texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended fonts-texgyre \
            poppler-utils
          pip install matplotlib numpy

      - name: Build the report fixture
        working-directory: markdown-latex-report
        run: make

      - name: Assert PDF produced
        working-directory: markdown-latex-report
        run: |
          test -s REPORT.pdf
          pages=$(pdfinfo REPORT.pdf | awk '/^Pages:/ {print $2}')
          echo "REPORT.pdf has $pages pages"
          test "$pages" -gt 10

      - name: Upload built report PDF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-fixture-pdf
          path: markdown-latex-report/REPORT.pdf
          if-no-files-found: warn

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build .skill bundles
        id: build
        run: |
          mkdir -p dist
          # A skill is any directory containing a SKILL.md.
          for skill_md in */SKILL.md; do
            dir="$(dirname "$skill_md")"
            name="$(basename "$dir")"
            # Zip files only (SKILL.md at archive root), no directory entries, skip .gitignore.
            ( cd "$dir" && find . -type f ! -name '.gitignore' ! -path './docs/*' | sed 's|^\./||' | sort | zip -X "../dist/${name}.skill" -@ )
            echo "Built dist/${name}.skill"
          done
          ls -l dist

      - name: Compute release tag
        id: tag
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: |
            Automated build from ${{ github.sha }}.
            Each `.skill` is a zip of its skill directory. Unzip into your Claude Code skills location.
          files: dist/*.skill
