name: Package skills

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test-polisher:
    # Reports pass/fail only. Does NOT gate the package job below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python deps
        run: pip install playwright pillow pypdfium2 pymupdf

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run quick smoke test
        run: bash claude-html-pdf-polisher/scripts/test_skill_quick.sh

  test-report:
    # Builds the markdown-latex-report fixture PDF. Reports pass/fail only;
    # does NOT gate the package job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-luatex texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended fonts-texgyre \
            poppler-utils
          pip install matplotlib numpy

      - name: Build the report fixture
        working-directory: markdown-latex-report
        run: make

      - name: Assert PDF produced
        working-directory: markdown-latex-report
        run: |
          test -s REPORT.pdf
          pages=$(pdfinfo REPORT.pdf | awk '/^Pages:/ {print $2}')
          echo "REPORT.pdf has $pages pages"
          test "$pages" -gt 10

      - name: Upload built report PDF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: report-fixture-pdf
          path: markdown-latex-report/REPORT.pdf
          if-no-files-found: warn

  test-lean:
    # Compiles the archive-conversation-forks Lean proof (mathlib-free, pinned Lean 4.10.0
    # via proofs/lean-toolchain). Reports pass/fail only; does NOT gate the package job below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build the Lean proof
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: archive-conversation-forks/proofs

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build .skill bundles
        id: build
        run: |
          mkdir -p dist
          # A skill is any directory containing a SKILL.md.
          for skill_md in */SKILL.md; do
            dir="$(dirname "$skill_md")"
            name="$(basename "$dir")"
            # Zip files only (SKILL.md at archive root), no directory entries, skip .gitignore.
            ( cd "$dir" && find . -type f ! -name '.gitignore' | sed 's|^\./||' | sort | zip -X "../dist/${name}.skill" -@ )
            echo "Built dist/${name}.skill"
          done
          ls -l dist

      - name: Publish rolling 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # One rolling release that always reflects the current main, bundles refreshed each push.
          # Remove the previous release + its (moving) tag, then recreate at this commit.
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
          gh release create latest \
            --target "$GITHUB_SHA" \
            --title "Latest skills" \
            --notes "Rolling build from \`$GITHUB_SHA\` ($(date -u +%Y-%m-%d)). Each \`.skill\` is a zip of its skill directory; unzip into your Claude Code skills location." \
            dist/*.skill
